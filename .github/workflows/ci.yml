name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  lint-misc:
    name: Lint PHP/JS/CSS/Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.11

      - name: PHP syntax check
        run: |
          for f in php/*.php php/includes/*.php; do
            php -l "$f" || exit 1
          done

      - name: JS/CSS lint
        run: biome check

      - name: Shell lint
        run: shellcheck --severity=warning scripts/*.sh systemd/*.sh hardening/*.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=kayak --cov-report=term-missing --cov-fail-under=60 -q

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
