name: CI

# CI/prod parity (PLAN_pre_release_followup.md T2.1):
#
# Prod runs Debian 13 (Trixie): PHP 8.4, Python 3.13. The runner image
# `ubuntu-24.04` is the closest LTS GitHub offers; we pin to it
# explicitly instead of `ubuntu-latest` so a future auto-bump (to
# ubuntu-26.04 in 2026) can't silently shift the system-library
# baseline. PHP and Python are further pinned to 8.4 / 3.13 via
# shivammathur/setup-php@v2 and actions/setup-python@v6 — those
# override whatever the OS ships, so the prod-parity invariant doesn't
# rely on the runner's default toolchain.
#
# An OS / PHP / Python bump on prod requires a PR that updates these
# pins (and verifies parity locally), not a CI surprise.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      # Pin to the version in uv.lock / .pre-commit-config.yaml so the format
      # gate can't drift when ruff ships a release (the churn behind df6e422).
      - run: pip install ruff==0.15.11
      - run: ruff check src/ tests/ scripts/ docs/one-offs/
      - run: ruff format --check src/ tests/ scripts/ docs/one-offs/

  lint-misc:
    name: Lint PHP/JS/CSS/Shell
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.4 (with pdo_sqlite for unit tests)
        # Third-party actions are pinned to a commit SHA (supply-chain: a
        # moved tag can't silently change what runs); the trailing `# tag`
        # tracks the human-readable version for Dependabot, which bumps
        # SHA-pinned actions. GitHub-owned actions/* stay on major tags.
        # Re-resolve: gh api repos/<owner>/<repo>/commits/<tag> --jq .sha
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.4"
          # Prod PHP-FPM lacks mbstring (CLAUDE.md §PHP Tooling). CI installs only
          # what prod has, so a future mb_* call fails locally + in CI before it
          # 500s in prod. Verified zero mb_* call sites in src/ (incl. the
          # packaged web/php layer), scripts/, tests/ as of 2026-05-14.
          extensions: pdo_sqlite, curl, pcov
          # pcov is the lightweight line-coverage driver (vs xdebug).
          # PHPUnit emits the Clover report consumed by
          # scripts/check-php-coverage.sh. T2.7 / PLAN_pre_release_followup.md.
          coverage: pcov
          # Be explicit: setup-php @coverage:pcov drops the extension in,
          # but a previous CI run reported 5553 statements / 0 covered —
          # the canonical "pcov loaded but pcov.enabled=0" symptom. Set
          # both directives at the runner level so pcov can't silently
          # disable itself.
          ini-values: pcov.enabled=1, pcov.directory=.
          tools: composer:v2

      - name: Install biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: 2.4.11

      - name: PHP syntax check
        run: |
          for f in src/kayak/web/php/*.php src/kayak/web/php/includes/*.php src/kayak/web/php/_internal/*.php; do
            php -l "$f" || exit 1
          done

      - name: JS/CSS lint
        run: biome check

      - name: Shell lint
        run: shellcheck --severity=warning scripts/*.sh systemd/*.sh deploy/*.sh docs/one-offs/*.sh

      - name: PHPStan-level consistency
        run: scripts/check-phpstan-level.sh

      # Promoted from pre-commit-only to CI (review-4 R4.7): the file-private
      # helper-prefix convention is now mechanized, not bypassable via --no-verify.
      - name: PHP helper-prefix convention
        run: scripts/check-php-helper-prefix.sh

      # review-4 R4.2: validate systemd unit SYNTAX (.service AND .timer) before
      # it can reach prod. systemd-analyze is Linux-only, so this lives in CI.
      - name: systemd unit validation
        run: |
          scripts/verify-systemd-units.sh systemd/*.service systemd/*.timer
          # self-test: the guard must reject a genuinely-malformed unit (non-vacuous)
          printf '[Unit]\nDescription=kayak R4.2 self-test (no ExecStart)\n[Service]\nType=simple\n' > "${RUNNER_TEMP:-/tmp}/kayak-bad.service"
          if scripts/verify-systemd-units.sh "${RUNNER_TEMP:-/tmp}/kayak-bad.service" >/dev/null 2>&1; then
            echo "::error::R4.2 self-test failed — a malformed unit passed validation"; exit 1
          fi
          echo "self-test ok: malformed unit correctly rejected"

      # round-5 R1.2 / R1.1: db_push.sh must keep its timer-restart trap and stay
      # free of the DELETE FROM pages restore-breaker (project-review-5/).
      - name: db_push.sh restart-trap guard
        run: scripts/check-db-push-trap.sh

      - name: Install PHP dev dependencies
        # setup-php@v2 writes ~/.composer/auth.json with the runner's
        # ambient GITHUB_TOKEN. GitHub recently shifted the runner token
        # to an OIDC/JWT format (ghs_<appid>_<jwt>) whose dot separators
        # fail composer's char check. composer.json has no github-hosted
        # deps — only Packagist — so clearing the auth is the cleanest
        # fix (no rate-limit concerns either; deps come from Packagist).
        run: |
          composer config --global --unset github-oauth.github.com || true
          composer install --no-interaction --no-progress --prefer-dist

      - name: composer audit
        # Fails on any known vulnerability in installed packages
        # (Packagist's advisory feed). Default behavior includes dev
        # deps. roave/security-advisories (require-dev) is a belt-and-
        # suspenders gate that refuses to resolve known-bad versions at
        # composer install time; this step catches advisories that
        # landed after the last lock-file update.
        run: composer audit

      # PHPUnit needs `levels init-db` available to seed the integration
      # tests' tmp SQLite schema (option (b) from PLAN_php_layer_split.md
      # Phase 1.3 — keeps the schema in lockstep with src/kayak/db/models.py
      # via the same Python CLI that production uses).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install kayak package (for `levels init-db`)
        run: pip install -e .

      - name: Pin levels for the emit-config parity test (R4.5)
        # Export the resolved path so the emit-config parity test
        # (tests/php/ConfigTest.php) RUNS (env set + executable) instead of
        # depending on an implicit PATH-ordering artifact. Fail loudly here if
        # `levels` isn't on PATH (e.g. a future edit drops the `pip install -e .`
        # above) rather than exporting an empty value and letting the parity test
        # silently skip — the exact skip-as-invisible-pass mode R4.5 exists to kill.
        run: |
          bin="$(command -v levels)" || {
            echo "::error::levels not on PATH — the 'pip install -e .' step is required for the emit-config parity test (R4.5)"
            exit 1
          }
          echo "KAYAK_LEVELS_BIN=$bin" >> "$GITHUB_ENV"

      - name: PHPUnit (with line coverage via pcov)
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text

      - name: PHP coverage gate (58% floor)
        # The in-process functional harness (tests/php/FunctionalTestCase.php)
        # lets pcov see handler logic that the `php -S` subprocess integration
        # tests can't, lifting line coverage ~9% -> ~60%. Floor at 58% sits
        # ~2pts below the current 60.4% (3966/6564) — catches regressions while
        # leaving headroom for new code; ratchet up further as coverage grows.
        # (The number still reflects only in-process tests — the subprocess
        # integration tests remain uncounted by pcov.)
        run: FLOOR_PERCENT=58 scripts/check-php-coverage.sh coverage.xml

      - name: PHPStan
        # Level 9 + full strict-rules; phpstan-baseline.neon carries the
        # residual mixed-typing (PDO-row) finds, shrinking as types are
        # narrowed. See docs/PLAN_phpstan_level9_strict.md.
        # --memory-limit bumped because TypeSpecifier on the larger
        # entry-point files (reach.php / description.php) exceeds the
        # 128MB default.
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: php-cs-fixer
        # Format gate (analog of `ruff format --check`). Config lives in
        # .php-cs-fixer.dist.php; PSR-12-derived ruleset that preserves
        # the codebase's K&R braces and one-line if-returns. Per Phase
        # 1.2 of docs/PLAN_php_layer_split.md.
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      # JS smoke tests via Playwright (docs/PLAN_js_smoke_tests.md
      # Phase 2). globalSetup spawns its own `php -S` against a
      # `levels init-db` (schema) + `levels build` tmp setup, so no extra
      # PHP-server orchestration is needed in this job — Playwright
      # owns the lifecycle.
      - uses: actions/setup-node@v6
        with:
          node-version: '22' # Active LTS until Apr 2027; matches plan's recommendation.
          cache: 'npm'
      - name: Install JS test deps
        run: npm ci

      - name: npm audit
        # Fail only on high or critical advisories — moderate/low are noisy
        # for a tooling-only package.json (biome + playwright). Matches the
        # severity gate the composer audit step uses (composer audit defaults
        # to all severities, but its advisory set is much smaller).
        run: npm audit --audit-level=high
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browser (chromium)
        # --with-deps installs Chromium's apt-level system libs; needs
        # sudo on the runner, which GitHub-hosted Ubuntu runners support.
        # Dev hosts without sudo (see [feedback_no_sudo] in CLAUDE memory)
        # use plain `npx playwright install chromium` and rely on
        # already-installed system libs.
        run: npx playwright install --with-deps chromium
      - name: JS smoke tests
        # Same wrapper as `composer test` / `composer analyse` — the
        # package.json script is the canonical entry point so local
        # `npm test` and CI run the same command.
        run: npm test
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      # scripts/ isn't strictly typed wholesale; gate the prod-path metadata
      # scripts that round-trip the live DB, plus the elevation refresh (httpx
      # now declared in the dev extra). The one-off harvest scripts stay out.
      - run: mypy src/ scripts/import_metadata.py scripts/refresh_reach_elevations.py

  test:
    runs-on: ubuntu-24.04
    # Code CI runs entirely against the committed fixture (tests/fixtures/dataset):
    # no code test reads the dataset root (DATASET_DIR) since the
    # dataset-separation test-repointing (#124), and dataset-integrity checks live
    # in `levels validate-dataset`, run here on the fixture. S4b-1 removed the
    # former kayak_data checkout + paired-branch logic from this job (so code CI no
    # longer needs the kayak_data deploy key, and Dependabot PRs — which can't read
    # that secret — run clean). The real dataset is validated at the deploy
    # boundary (deploy.sh step 3.08, #132) and pre-merge by kayak_data's own
    # required CI (S4b-2: validate.yml installs the engine pinned by the BASE
    # commit's engine_test_ref and runs validate-dataset + generate-sources
    # --check + sync/build smoke).
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check
      - run: uv sync --locked --all-extras
      # KayakConfig boots cleanly against the CI runner's (mostly empty)
      # env — exercises `validate_default=True` so a default that drifts
      # out of its constraint (e.g. fetch_timeout=0) fails CI rather than
      # silently shipping. --known-env --strict promotes "config-shaped
      # OS env not in the allowlist" to a build break; the prefix scan
      # ignores GitHub-runner internals (GITHUB_*, RUNNER_*, INPUT_*).
      - name: validate-config (Phase 3.4)
        run: uv run levels validate-config --known-env --strict
      # ``-m ''`` overrides the project default ``-m 'not slow'`` so the
      # integration test still gates merges in CI. Coverage threshold only
      # makes sense once, so attach it to the 3.13 leg.
      - name: Run tests (with slow marker enabled)
        run: uv run pytest -m '' --cov=kayak --cov-report=term-missing --cov-fail-under=75 -q

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    # gitleaks-action@v2 calls GET /pulls/N/commits to enumerate the PR
    # range, which needs pull-requests: read. The workflow's default token
    # gets only contents: read on pull_request events, so the call 403'd.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install pip-audit
      # Ignore PYSEC-2026-89 / CVE-2025-69534 against markdown 3.10.2 —
      # a DoS via unhandled AssertionError in html.parser.HTMLParser on
      # malformed input. Two reasons to suppress:
      #   1. kayak's only `import markdown` is at build time in
      #      src/kayak/web/build/deploy.py, rendering DATASET_DIR/regression/*.md
      #      → static HTML. That input is dataset-authored (kayak_data) but
      #      PR-reviewed and rendered/validated at `levels validate-dataset`
      #      (the deploy gate), which would surface a parser-crashing file
      #      before prod — so no adversarial input reaches the library at
      #      runtime, and the DoS surface is nil.
      #   2. The OSV record has a malformed affected-range (introduced=0
      #      with an empty closing event), so pip-audit treats every
      #      markdown version as affected and reports "Fix Versions"
      #      empty — even though the advisory body says 3.8.1 patched
      #      it, and 3.10.2 is the current PyPI release.
      # Revisit when the OSV record is amended or 3.10.x ships a patch.
      - run: pip-audit --strict --ignore-vuln PYSEC-2026-89 .

  wheel-smoke:
    name: Wheel smoke (packaged-resource install)
    runs-on: ubuntu-24.04
    # Builds the wheel, installs it into a fresh venv OUTSIDE the checkout, and
    # runs init-db + build against it (dataset-separation S4a-2 slice C). Guards
    # the packaging invariant the slices established: every runtime resource
    # (data YAMLs, migrations, web static/php, install templates, LICENSE) ships
    # in the wheel and resolves via importlib.resources — so a regression to a
    # repo-root BASE_DIR read, or a data file that stops shipping, fails CI.
    # No kayak_data / PHP / Node needed — it only exercises packaged resources.
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel, install outside the checkout, run the engine
        run: scripts/wheel-smoke.sh
