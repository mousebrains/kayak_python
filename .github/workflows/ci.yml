name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  lint-misc:
    name: Lint PHP/JS/CSS/Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install biome
        run: |
          curl -fsSL "https://github.com/biomejs/biome/releases/download/%40biomejs/biome%402.4.11/biome-linux-x64" -o /usr/local/bin/biome
          chmod +x /usr/local/bin/biome

      - name: PHP syntax check
        run: |
          for f in php/*.php php/includes/*.php; do
            php -l "$f" || exit 1
          done

      - name: JS/CSS lint
        run: biome check static/ public_html/no_show_review.js src/kayak/web/static/levels.js php/style.css src/kayak/web/static/style.css

      - name: Shell lint
        run: shellcheck --severity=warning scripts/*.sh systemd/*.sh hardening/*.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=kayak --cov-report=term-missing -q
