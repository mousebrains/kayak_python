name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  lint-misc:
    name: Lint PHP/JS/CSS/Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP 8.4 (with pdo_sqlite for unit tests)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, curl, mbstring
          coverage: none
          tools: composer:v2

      - name: Install biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.11

      - name: PHP syntax check
        run: |
          for f in php/*.php php/includes/*.php; do
            php -l "$f" || exit 1
          done

      - name: JS/CSS lint
        run: biome check

      - name: Shell lint
        run: shellcheck --severity=warning scripts/*.sh systemd/*.sh

      - name: Install PHP dev dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit

      - name: PHPStan
        # Level 7 with phpstan-baseline.neon grandfathering the 123
        # pre-existing issues. Per docs/PLAN_php_layer_split.md, the
        # baseline shrinks tier-by-tier as files are split.
        # --memory-limit bumped because TypeSpecifier on the larger
        # entry-point files (reach.php / description.php) exceeds the
        # 128MB default.
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: php-cs-fixer
        # Format gate (analog of `ruff format --check`). Config lives in
        # .php-cs-fixer.dist.php; PSR-12-derived ruleset that preserves
        # the codebase's K&R braces and one-line if-returns. Per Phase
        # 1.2 of docs/PLAN_php_layer_split.md.
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check
      - run: uv sync --locked --all-extras
      # ``-m ''`` overrides the project default ``-m 'not slow'`` so the
      # integration test still gates merges in CI. Coverage threshold only
      # makes sense once, so attach it to the 3.13 leg.
      - name: Run tests (with slow marker enabled)
        run: uv run pytest -m '' --cov=kayak --cov-report=term-missing --cov-fail-under=75 -q

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action@v2 calls GET /pulls/N/commits to enumerate the PR
    # range, which needs pull-requests: read. The workflow's default token
    # gets only contents: read on pull_request events, so the call 403'd.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install pip-audit
      - run: pip-audit --strict .
