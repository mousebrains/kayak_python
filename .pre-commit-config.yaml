repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
          - python-dotenv
          - lxml-stubs
          - aiohttp
        pass_filenames: false
        args: [src/]
