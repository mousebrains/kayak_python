repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
          - python-dotenv
          - lxml-stubs
          - aiohttp
        pass_filenames: false
        args: [src/]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.11
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.11"]
        files: \.(js|css)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: php-lint
        name: PHP syntax check
        entry: php -l
        language: system
        files: \.php$
        types: [file]
      - id: php-cs-fixer
        name: php-cs-fixer (format)
        # Runs the project config (.php-cs-fixer.dist.php). Same gate CI
        # uses; failing means the file would have been rewritten and needs
        # a `vendor/bin/php-cs-fixer fix` before commit.
        entry: vendor/bin/php-cs-fixer fix --dry-run --diff
        language: system
        files: ^php/.+\.php$
        pass_filenames: false
        # Skipped if vendor/ isn't present (fresh checkout). Operator runs
        # `composer install` once.
        stages: [pre-commit]
      - id: phpstan
        name: PHPStan
        # Same gate CI runs in lint-misc (level 7 with phpstan-baseline.neon
        # grandfathering). Surfaces typed-PHP regressions before push
        # instead of waiting for the CI cycle. Per PLAN_pre_release_followup.md T2.6.
        entry: vendor/bin/phpstan analyse --memory-limit=1G --no-progress
        language: system
        files: \.php$
        pass_filenames: false
        # Skipped if vendor/ isn't present (fresh checkout); same caveat
        # as php-cs-fixer above.
        stages: [pre-commit]
