repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
          - python-dotenv
          - lxml-stubs
          - aiohttp
          - httpx
          - pydantic>=2.7
          - pydantic-settings>=2.4
        pass_filenames: false
        # Mirror CI's `mypy src/ scripts/import_metadata.py
        # scripts/export_metadata.py scripts/refresh_reach_elevations.py`. The
        # hook runs in an isolated env with no
        # editable kayak install; `mypy_path = "src"` in pyproject lets the
        # scripts resolve `kayak.*` here (additional_dependencies above cover
        # their third-party imports). Keeps the local gate from passing what CI
        # rejects.
        args: [src/, scripts/import_metadata.py, scripts/export_metadata.py, scripts/refresh_reach_elevations.py]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.11
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.11"]
        files: \.(js|css)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: php-lint
        name: PHP syntax check
        entry: php -l
        language: system
        files: \.php$
        types: [file]
      - id: php-cs-fixer
        name: php-cs-fixer (format)
        # Runs the project config (.php-cs-fixer.dist.php). Same gate CI
        # uses; failing means the file would have been rewritten and needs
        # a `vendor/bin/php-cs-fixer fix` before commit.
        entry: vendor/bin/php-cs-fixer fix --dry-run --diff
        language: system
        files: ^php/.+\.php$
        pass_filenames: false
        # Skipped if vendor/ isn't present (fresh checkout). Operator runs
        # `composer install` once.
        stages: [pre-commit]
      - id: phpstan
        name: PHPStan
        # Same gate CI runs in lint-misc (level 9 with phpstan-baseline.neon
        # grandfathering). Surfaces typed-PHP regressions before push
        # instead of waiting for the CI cycle. Per PLAN_pre_release_followup.md T2.6.
        entry: vendor/bin/phpstan analyse --memory-limit=1G --no-progress
        language: system
        files: \.php$
        pass_filenames: false
        # Skipped if vendor/ isn't present (fresh checkout); same caveat
        # as php-cs-fixer above.
        stages: [pre-commit]
      - id: php-helper-prefix
        name: PHP helper-prefix convention
        # Enforces the _<file>_* convention for file-private helpers in
        # php/includes/. New helpers must contain the file's basename
        # stem (with _handler / _detail stripped); the _gp_* cross-file
        # cluster is allowlisted as a prefix; the 24 grandfathered
        # offenders captured 2026-05-15 live in
        # scripts/php-helper-prefix.allowlist. Per CONVENTIONS.md
        # "File-private helpers carry the file's prefix" and
        # PLAN_pre_release_followup.md § T2.8.
        entry: scripts/check-php-helper-prefix.sh
        language: system
        # Trigger on any change to a check input OR the script/allowlist
        # themselves (so e.g. dropping a line from the allowlist re-runs
        # the gate on the next commit).
        files: ^(php/includes/.+\.php|scripts/check-php-helper-prefix\.sh|scripts/php-helper-prefix\.allowlist)$
        pass_filenames: false
      - id: phpstan-level
        name: no stale PHPStan-level references
        # phpstan.neon is at level 9; fail if a badge or comment drifts back to
        # a stale PHPStan level (review-4 R2.1). Whole-tree grep so a hand-scoped
        # sweep can't miss a surface; the script carries the historical-note
        # exclusions.
        entry: scripts/check-phpstan-level.sh
        language: system
        files: \.(md|ya?ml|neon|php)$
        pass_filenames: false
