# /etc/ssh/sshd_config.d/hardening.conf
# Keys-only, single-user, headless server hardening

PasswordAuthentication no
PermitRootLogin no
AllowUsers pat
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
MaxAuthTries 3
LoginGraceTime 30
MaxStartups 3:50:10
ClientAliveInterval 300
ClientAliveCountMax 2
LogLevel VERBOSE
