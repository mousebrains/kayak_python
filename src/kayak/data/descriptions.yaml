# Description field definitions for river detail pages.
# Converted from init_db.py _seed_description_fields().
#
# type: rendering mode
#   noop=internal/skip, text=plain text, DB=link to data view,
#   URL=link to plot, calc=calculation display, ptxt=preformatted text

fields:
