    column: "hash_value"
    type: "noop"
    prefix: ""
    suffix: ""
    info: "Must be first"

  - sort_key: 1
    column: "display_name"
    type: "noop"
    prefix: ""
    suffix: ""
    info: "Must be second"

  - sort_key: 100
    column: "class"
    type: "text"
    prefix: "Class"
    suffix: "<br />"

  - sort_key: 200
