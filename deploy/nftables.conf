#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif lo accept

        # Established/related connections
        ct state established,related accept

        # Drop invalid
        ct state invalid drop

        # ICMP — allow ping and essential types
        ip protocol icmp icmp type { echo-request, echo-reply, destination-unreachable, time-exceeded } accept
        ip6 nexthdr icmpv6 accept

        # SSH — rate-limit new connections (3 per minute per source IP)
        tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept

        # HTTP + HTTPS
        tcp dport { 80, 443 } accept

        # Log + drop everything else (rate-limited to avoid log flood)
        limit rate 5/minute burst 10 packets log prefix "nftables-drop: " level info
        drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
