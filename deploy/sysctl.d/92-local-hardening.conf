# /etc/sysctl.d/92-local-hardening.conf
# Items 3 + kexec from item 1 of the hardening plan.
# These complement (do not replace) 90-hardening.conf and 99-hardening.conf.

# Disable unprivileged user namespaces. Used by container runtimes (snap,
# podman --rootless, bubblewrap, browser sandboxes). On a headless web VM
# with snap removed, nothing legitimate needs them and they remain a
# recurring source of local LPE bugs.
kernel.unprivileged_userns_clone = 0

# Disable unprivileged eBPF. Repeated source of kernel LPEs.
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# Block kexec_load(2). Defense in depth against an attacker swapping the
# running kernel via kexec after gaining root. No effect on normal reboots.
kernel.kexec_load_disabled = 1
