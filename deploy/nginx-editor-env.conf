# /etc/nginx/conf.d/editor-env.conf
#
# Environment values passed to PHP-FPM for the editor/Comment feature.
# Source of truth for the current prod (levels-test.wkcc.org soak,
# pre-2026-05-20 cutover). After cutover, flip $site_url's default to
# "https://levels.wkcc.org" (or switch to the hostname-aware map form
# commented below).
#
# To apply:  sudo cp deploy/nginx-editor-env.conf /etc/nginx/conf.d/editor-env.conf
#            sudo nginx -t && sudo systemctl reload nginx

map $host $editor_feature     { default "1"; }
# Turnstile site key is public (appears in HTML as data-sitekey); safe to
# commit. The matching secret is loaded from /etc/kayak/secrets.env via
# the PHP-FPM pool overlay — see deploy/install-config.sh — never nginx.
map $host $turnstile_site_key { default "0x4AAAAAADHPQgNwKKY4klU9"; }
map $host $mail_from          { default "pat.kayak@gmail.com"; }
# $site_url is the canonical public URL that goes in magic-link emails
# and maintainer notifications. Soak target = levels-test.wkcc.org;
# at 2026-05-20 cutover, flip to "https://levels.wkcc.org" (or use
# hostname-aware form):
#   map $host $site_url { hostnames; levels-test.wkcc.org "https://levels-test.wkcc.org"; default "https://levels.wkcc.org"; }
map $host $site_url           { default "https://levels-test.wkcc.org"; }
