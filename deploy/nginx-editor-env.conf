# /etc/nginx/conf.d/editor-env.conf
#
# Environment values passed to PHP-FPM for the editor/Comment feature.
# Values are empty by default (feature off). To enable, change the defaults
# below and reload nginx:
#   sudo systemctl reload nginx
#
# Alternatively, set these via a custom ngx_http_map_module data source;
# the map $host form makes them trivial to override per-hostname later.

map $host $editor_feature     { default ""; }
map $host $hcaptcha_site_key  { default ""; }
# $hcaptcha_secret is now loaded from /etc/kayak/secrets.env via the
# PHP-FPM pool overlay — not passed through nginx any more. See
# deploy/migrate-secrets.sh.
# map $host $hcaptcha_secret    { default ""; }
map $host $mail_from          { default ""; }
# $site_url is the canonical public URL that goes in magic-link emails and
# maintainer notifications. levels.wkcc.org is the target public name; once
# it resolves and the cert covers it the default is correct as-is. Operators
# can override per-host if they need a staging URL — e.g.
#   map $host $site_url { hostnames; levels-test.wkcc.org "https://levels-test.wkcc.org"; default "https://levels.wkcc.org"; }
map $host $site_url           { default "https://levels.wkcc.org"; }
