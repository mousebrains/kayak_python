# /etc/nginx/conf.d/editor-env.conf
#
# Environment values passed to PHP-FPM for the editor/Comment feature.
# Source of truth for prod. The 2026-05-20 cutover is done: $site_url
# resolves per-host (the soak host keeps its own URL; everything else,
# i.e. production, gets https://levels.wkcc.org).
#
# To apply:  sudo cp deploy/nginx-editor-env.conf /etc/nginx/conf.d/editor-env.conf
#            sudo nginx -t && sudo systemctl reload nginx

map $host $editor_feature     { default "1"; }
# Turnstile site key is public (appears in HTML as data-sitekey); safe to
# commit. The matching secret is loaded from /etc/kayak/secrets.env via
# the PHP-FPM pool overlay — see deploy/install-config.sh — never nginx.
map $host $turnstile_site_key { default "0x4AAAAAADHPQgNwKKY4klU9"; }
map $host $mail_from          { default "pat.kayak@gmail.com"; }
# $site_url is the canonical public URL that goes in magic-link emails and
# maintainer notifications. Hostname-aware so the same file works on every
# vhost: the soak host keeps its own URL; every other host (production) gets
# https://levels.wkcc.org.
map $host $site_url {
    hostnames;
    levels-test.wkcc.org "https://levels-test.wkcc.org";
    default              "https://levels.wkcc.org";
}
