# Redirect HTTP → HTTPS for both hostnames
server {
    listen 80;
    listen [::]:80;
    server_name levels.mousebrains.com levels.wkcc.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name levels.mousebrains.com levels.wkcc.org;

    # Let's Encrypt certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/levels.mousebrains.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/levels.mousebrains.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (enable once you've confirmed SSL works)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Document root — where build output + PHP symlinks live
    root /home/tpw/kayak/public_html;
    index index.html;

    # Gzip — big win for the inline-SVG HTML pages
    gzip on;
    gzip_types text/html text/plain text/css text/csv
               application/json application/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Block access to PHP includes (db.php, svg_plot.php, etc.)
    location /includes/ {
        deny all;
        return 404;
    }

    # Static assets — long cache, immutable content
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Generated HTML/CSV/text pages — short cache, regenerated hourly
    location / {
        try_files $uri $uri/ =404;
        expires 5m;
        add_header Cache-Control "public";
    }

    # PHP endpoints via php-fpm
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Pass environment to PHP
        fastcgi_param SQLITE_PATH /home/tpw/kayak/kayak.db;

        # Cache PHP responses (5 min for reads, no cache for edits)
        # Browsers respect these; optionally add fastcgi_cache for server-side
        add_header Cache-Control "public, max-age=300";
    }

    # Disable caching on the edit endpoint
    location = /edit.php {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param SQLITE_PATH /home/tpw/kayak/kayak.db;
        add_header Cache-Control "no-cache, no-store";
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Custom error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Logging
    access_log /var/log/nginx/kayak-access.log;
    error_log  /var/log/nginx/kayak-error.log;
}
