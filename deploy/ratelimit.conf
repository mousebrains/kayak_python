# /etc/nginx/conf.d/ratelimit.conf
# Rate limit zone for edit endpoint — 5 requests/min per IP
limit_req_zone $binary_remote_addr zone=edit:1m rate=5r/m;
# Rate limit zone for PHP endpoints — 5 req/s per IP sustained
limit_req_zone $binary_remote_addr zone=php:10m rate=5r/s;
# Login (magic-link issuance) — tightest because each request enqueues
# an outbound email. Per-IP defense supplemented by per-email throttle
# inside auth.php's magic_link_under_throttle().
limit_req_zone $binary_remote_addr zone=login:1m rate=3r/m;
# Auth (token consumption + logout) — relaxed. Consumption requires a
# 32-byte token, so brute force is infeasible regardless of rate.
limit_req_zone $binary_remote_addr zone=auth:1m rate=10r/m;
# Contact form — anonymous; Turnstile + honeypot are first-line.
# Independent zone so contact spam can't lock out legitimate logins.
limit_req_zone $binary_remote_addr zone=contact:1m rate=10r/m;
# Generous global per-IP rate limit — catches flood abuse on static
# paths without touching real users (well under 20 r/s in practice).
limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
