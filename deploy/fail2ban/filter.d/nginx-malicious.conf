# /etc/fail2ban/filter.d/nginx-malicious.conf
# Ban IPs making clearly malicious requests (credential harvesting,
# exploit attempts, protocol confusion, vulnerability scanning).

[Definition]

failregex = ^<HOST> .* "(GET|POST|HEAD|PUT|DELETE) /\.env[. ].*" (301|400|403|404) .*$
