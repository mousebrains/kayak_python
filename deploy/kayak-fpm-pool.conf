; /etc/php/<version>/fpm/pool.d/kayak.conf — overlay for the www pool.
;
; Loads secrets from /etc/kayak/secrets.env and re-exports them into the
; PHP worker environment so getenv()/$_SERVER sees them without the
; values ever living in world-readable nginx config.
;
; Install:
;   sudo install -D -m 0644 deploy/kayak-fpm-pool.conf \
;     /etc/php/$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;')/fpm/pool.d/kayak.conf
;   sudo systemctl restart php-fpm
;
; Notes:
; - This is NOT a full pool definition; it assumes the default www pool
;   already exists (created by the php-fpm Debian package) and overrides
;   a couple of entries. If your distro names the pool differently,
;   rename the [www] header below to match.
; - env[X] = $X reads from the pool process environment. That env is
;   populated by the php-fpm master via a systemd drop-in
;   (deploy/php-fpm-secrets-dropin.conf) that pulls in
;   /etc/kayak/secrets.env. Without that drop-in these values resolve
;   to empty strings and Turnstile silently disables.

[www]
clear_env = no

; Filesystem sandbox for PHP workers. Pool-level php_admin_value replaces
; (does not extend) any open_basedir in php.ini, so the full list lives
; here and the php.ini line should stay commented out — one source of truth.
;   public_html  — doc root (static build output + PHP entry points)
;   kayak/php    — PHP sources included/required from public_html
;   DB           — SQLite database + WAL sidecars
;   logs         — CSP violation log written by php/csp-report.php
php_admin_value[open_basedir] = /home/pat/public_html:/home/pat/kayak/php:/home/pat/DB:/home/pat/logs

; Pull secrets in from /etc/kayak/secrets.env (mode 0600 root:www-data).
; EDIT_PASSWORD is intentionally absent — edit.php now uses the ed_sess
; editor-session cookie (require_maintainer()) instead of HTTP Basic Auth.
env[TURNSTILE_SECRET] = $TURNSTILE_SECRET
