# systemd drop-in: activate rename-over-target deploy mode.
# Installed at: /etc/systemd/system/kayak-pipeline.service.d/deploy-mode.conf
#
# On the next pipeline run this triggers a one-shot migration of
# /home/pat/public_html from the symlink + dated-target layout to a
# regular directory. Subsequent runs use per-file rename(2) into the
# same stable directory, eliminating the stale-staged-path open_basedir
# class of errors that appeared when an in-flight PHP request had
# __DIR__ frozen at a public_html_<epoch>/ that the next deploy removed.
#
# Migration detail: Linux rename(2) refuses to replace a symlink with a
# directory (ENOTDIR), so the code does unlink-then-rename — a ~10-50ms
# window where the path doesn't exist and requests 404. One-shot event
# for the life of the deploy; the symlink-restore fallback kicks in if
# rename fails after the unlink, so the worst case is "still a symlink,
# pipeline retries next hour".
#
# To deactivate / roll back: `sudo rm` this file, `sudo systemctl
# daemon-reload`, then manually restore the symlink layout if needed.
[Service]
Environment=KAYAK_DEPLOY_MODE=rename
