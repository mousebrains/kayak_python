# /etc/systemd/system/php<ver>-fpm.service.d/kayak-secrets.conf
#
# Injects /etc/kayak/secrets.env into the PHP-FPM master process
# environment so the per-pool env[] directives in kayak-fpm-pool.conf
# have something to interpolate from.
#
# PHP-FPM pool env[KEY] = $KEY reads from the pool process environment,
# which it inherits from the master, which is set by this systemd unit.
# Without this drop-in the pool env[] lines silently resolve to empty
# strings and the app falls back to "disabled" for hCaptcha + edit auth.
#
# The migrate-secrets.sh script installs this file under the correctly-
# versioned php<VER>-fpm unit (Debian names it e.g. php8.4-fpm.service).

[Service]
EnvironmentFile=/etc/kayak/secrets.env
