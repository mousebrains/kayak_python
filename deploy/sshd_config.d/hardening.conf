# /etc/ssh/sshd_config.d/hardening.conf
# Keys-only, single-user, headless server hardening

PasswordAuthentication no
PermitRootLogin no
AllowUsers pat
X11Forwarding no
AllowTcpForwarding yes
AllowAgentForwarding yes
AllowStreamLocalForwarding yes
MaxAuthTries 3
LoginGraceTime 30
MaxStartups 5:50:30
ClientAliveInterval 300
ClientAliveCountMax 2
LogLevel VERBOSE
DebianBanner no
Compression no

# IPv4 only — closes IPv6 gap in fail2ban coverage
AddressFamily inet

# Ed25519 host key only
HostKey /etc/ssh/ssh_host_ed25519_key

# Accept only ed25519 client keys
PubkeyAcceptedAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com

# Drop deprecated authorized_keys2
AuthorizedKeysFile .ssh/authorized_keys

# AEAD ciphers only — no CTR modes
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com

# Strong MACs only — no umac-64 or hmac-sha1
MACs umac-128-etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# Modern + post-quantum key exchange only
KexAlgorithms mlkem768x25519-sha256,sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
