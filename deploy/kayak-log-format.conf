# Timed access-log format for the kayak vhost.
# Installed at: /etc/nginx/conf.d/kayak-log-format.conf
# Referenced by the `access_log` directive in sites-available/levels.
# Adds rt=$request_time and urt=$upstream_response_time so /home/pat/logs.analyze/analyze.py
# can compute per-route latency quantiles.
#
# F-2: $request and $http_referer can carry a magic-link token in
# /auth.php?t=<64-hex-token>. Redact that segment before logging so the
# token never lands on disk. The `map` directives below produce
# $loggable_uri and $loggable_referer with the token replaced by REDACTED;
# all other request URIs and referers pass through unchanged. The
# log_format uses these instead of the raw $request / $http_referer.
#
# Match is broad on purpose: any URL or Referer with ?t=<32-128 hex> or
# &t=<32-128 hex> gets redacted, so future endpoints that take a token
# query param are protected by the same rule. The two-pattern shape
# handles t= as either the first query param (?t=…) or a subsequent one
# (?other=…&t=…); nginx's map applies only the first matching pattern.
map $request_uri $loggable_uri {
    "~^(?<pre>[^?]*\?)t=[0-9a-fA-F]{32,128}(?<post>.*)$"            "${pre}t=REDACTED${post}";
    "~^(?<pre>[^?]*\?[^&]*&)t=[0-9a-fA-F]{32,128}(?<post>.*)$"     "${pre}t=REDACTED${post}";
    default                                                          $request_uri;
}
map $http_referer $loggable_referer {
    "~^(?<pre>[^?]*\?)t=[0-9a-fA-F]{32,128}(?<post>.*)$"            "${pre}t=REDACTED${post}";
    "~^(?<pre>[^?]*\?[^&]*&)t=[0-9a-fA-F]{32,128}(?<post>.*)$"     "${pre}t=REDACTED${post}";
    default                                                          $http_referer;
}
log_format kayak_timed '$remote_addr - $remote_user [$time_local] '
                       '"$request_method $loggable_uri $server_protocol" $status $body_bytes_sent '
                       '"$loggable_referer" "$http_user_agent" '
                       'rt=$request_time urt=$upstream_response_time';
