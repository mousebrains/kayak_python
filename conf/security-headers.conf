# Security headers — included in every location block that uses add_header,
# because nginx's add_header in a child block replaces (not extends) the parent.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
# CSP notes:
#   style-src 'unsafe-inline' is intentional — the PHP pages use inline
#     style="..." attributes pervasively (Leaflet CSS injection, SVG sparkline
#     coords, per-row status colors). Removing would require touching 100+
#     call sites across description.php/reach.php/custom.php/build output.
#     Script injection is the real XSS risk; script-src 'self' (no
#     unsafe-inline) closes it.
#   form-action 'self' — forms only submit back to this origin.
#   frame-src 'none' — explicit even though default-src covers it.
#   report-uri /csp-report.php — violations POSTed to the PHP sink, which
#     appends JSON lines to /home/pat/DB/csp.log (rotated by
#     /etc/logrotate.d/kayak-csp, harvested by ../../logs/syncit, analyzed
#     by ../../logs/analyze.py).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.opentopomap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self'; form-action 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; report-uri /csp-report.php" always;
