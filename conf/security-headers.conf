# Security headers — included in every location block that uses add_header,
# because nginx's add_header in a child block replaces (not extends) the parent.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=(), browsing-topics=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
# CSP notes:
#   style-src 'unsafe-inline' is intentional — the PHP pages use inline
#     style="..." attributes pervasively (Leaflet CSS injection, SVG sparkline
#     coords, per-row status colors). Removing would require touching 100+
#     call sites across description.php/reach.php/custom.php/build output.
#     Script injection is the real XSS risk; script-src 'self' (no
#     unsafe-inline) closes it.
#   form-action 'self' — forms only submit back to this origin.
#   frame-src 'none' — explicit even though default-src covers it.
#   report-uri /csp-report.php — legacy CSP Level 1 sink, kept for browsers
#     that don't speak the Reporting API yet (the W3C validator flags it as
#     deprecated, hence the paired report-to + Reporting-Endpoints below).
#   report-to csp-endpoint — CSP Level 3 sink. Pointed at the same PHP
#     handler via the Reporting-Endpoints header; csp-report.php already
#     understands both payload shapes.
#   /home/pat/logs/csp.log is appended JSON-per-line (rotated by
#     /etc/logrotate.d/kayak-csp, harvested by /home/pat/logs/syncit, analyzed
#     by /home/pat/logs.analyze/analyze.py).
add_header Reporting-Endpoints "csp-endpoint=\"/csp-report.php\"" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.opentopomap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self'; form-action 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; report-uri /csp-report.php; report-to csp-endpoint" always;
