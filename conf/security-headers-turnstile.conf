# Security headers — Turnstile-enabled variant for /login.php and
# /contact.php (and any other page that embeds the Turnstile widget).
# Identical to security-headers.conf except the CSP allow-lists the
# Cloudflare Turnstile origin.
#
# Per Turnstile docs (https://developers.cloudflare.com/turnstile/reference/content-security-policy/),
# the widget needs script/frame access to challenges.cloudflare.com.
# Verification happens server-side from PHP, so connect-src does not need
# the Turnstile origin.
#
# style-src 'unsafe-inline' is inherited from the base policy — the PHP
# pages (header/footer/login/contact and the shared 404 body) use inline
# style="..." attributes pervasively. See conf/security-headers.conf for
# the full rationale.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.opentopomap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self'; frame-src https://challenges.cloudflare.com; form-action 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; report-uri /csp-report.php" always;
