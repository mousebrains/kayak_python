# conf/mime-extras.conf
# Deployed to /etc/nginx/conf.d/mime-extras.conf.
#
# Extends the default /etc/nginx/mime.types with mappings the upstream
# file doesn't carry yet. Lives at http context (conf.d/*.conf is
# included from within http{} per nginx.conf line 62), so all server
# blocks inherit these mappings via the standard types-merge rule.
#
# application/geo+json (RFC 7946 §12) is the registered MIME type for
# GeoJSON. Without this, .geojson responses fall through to the
# default_type (application/octet-stream), which triggers a download
# prompt in some browsers and prevents Content-Type-aware caches from
# applying their JSON-class behavior.

types {
    application/geo+json geojson;
}
