# conf/snippets/levels-common.conf
# Deployed to /etc/nginx/snippets/levels-common.conf.
#
# Shared server-level directives + all location blocks for the three kayak
# vhosts (levels.wkcc.org, levels-test.wkcc.org, levels.mousebrains.com).
# Per-vhost wrappers live in conf/sites/.
#
# Source: deploy/levels (current-live), plus two target deltas from the
# now-retired conf/levels.nginx — the /favicon.ico location was added,
# and the server-level Strict-Transport-Security duplicate was removed
# (security-headers.conf still emits it once per response).
#
# PATH LITERALS NOTE: the `root /home/pat/public_html;` line and
# the two `alias /home/pat/public_html/...` lines (favicon, security.txt) are
# LITERAL. nginx cannot read systemd's environment, and a
# `set $kayak_home ...;` plus `$kayak_home/...` rewrite adds
# per-server-block fragility (every server block needs the `set`,
# easy to miss when adding a new block). KAYAK_HOME indirection
# (T3.4) deliberately stops at this file.

# Hide server identity completely (requires libnginx-mod-http-headers-more-filter)
server_tokens off;
more_clear_headers Server;

# Security headers (server-level — apply when no location overrides).
# security-headers.conf provides HSTS; no separate server-level directive.
include /etc/nginx/snippets/security-headers.conf;

# Document root — where build output + PHP symlinks live
root /home/pat/public_html;
index index.html;

# Request size limit — no file uploads expected
client_max_body_size 16k;

# Gzip — big win for the inline-SVG HTML pages
gzip on;
gzip_types text/plain text/css text/csv
           application/json application/javascript
           image/svg+xml;
gzip_min_length 256;
gzip_vary on;

# Restrict HTTP methods to GET, HEAD, POST
if ($request_method !~ ^(GET|HEAD|POST)$) {
    return 405;
}

# Block known malicious scanners and exploit tools.
# Claude-SearchBot / ClaudeBot are included because they ignore robots.txt
# and generate enough hourly traffic to distort pipeline-freshness signals
# without ever being useful to our readers.
if ($http_user_agent ~* (zgrab|masscan|scanner/1\.0|libredtail|xfa1|Gh0st|^Hello|nvdorz|FreePBX-Scanner|Claude-SearchBot|ClaudeBot|r00ts3c|Scrapy|python-requests)) {
    return 444;
}

# Legacy URL redirects: pre-2026 levels.wkcc.org used /?P=<State>.html,
# /?D=<id>, /?f=<id>, /?g=<id>, /?t=<id>, and /?d. The new site uses
# different paths and IDs with no clean translation, so bounce all of
# these to the site root. Browsers preserve any #A<id> fragment across
# the redirect; the new site doesn't define those anchors so they're
# silently ignored. 301 (permanent) so search engines/bookmarks update.
if ($request_uri ~ "^/\?(P|D|f|g|t|d)(=|&|$)") {
    return 301 $scheme://$host/;
}

# Legacy CGI endpoints — same era as the /?P=… / /?g=… redirects above.
# The old C++ site exposed /cgi/picker/, /cgi/png?hash=…&type=flow&…, and
# /cgi/makePage?h=… ; the new Python+PHP site has no equivalents so the
# hashes don't translate. Send these to the site root (drop the legacy
# query string with the trailing `?`) instead of letting them 404 — these
# are bookmarked links + RSS-feed URLs from before the rewrite, hit by
# real users who otherwise bounce off the 404 page.
location ~ ^/cgi/ {
    return 301 $scheme://$host/?;
}

# Block dotfiles (.git, .env, .htaccess, etc.)
location ~ /\. {
    deny all;
    return 404;
}

# Block access to PHP includes (db.php, svg_plot.php, etc.)
# Use regex to override the \.php$ location (regex precedence rules)
location ~ ^/includes/ {
    deny all;
    return 404;
}

# Browsers auto-request /favicon.ico even when the page links
# /static/favicon.ico via <link rel="icon">. Serve the same file from
# the root path rather than letting the request fall through to the
# generic / location and 404. access_log + log_not_found off to keep
# crawler favicon-probe noise out of the log.
location = /favicon.ico {
    alias /home/pat/public_html/static/favicon.ico;
    access_log off;
    log_not_found off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Safari / iOS WebKit probes /apple-touch-icon*.png at the document root
# regardless of our <link rel="apple-touch-icon" href="/static/icon-180.png">
# tag — for Home Screen add, tab previews, and share thumbnails. Six
# variants observed (default, -precomposed, ±-120x120 / -152x152). One
# 180x180 source is enough; iOS downscales per device DPI. Same shape as
# the /favicon.ico block above.
location ~ ^/apple-touch-icon(?:-\d+x\d+)?(?:-precomposed)?\.png$ {
    try_files /static/icon-180.png =404;
    access_log off;
    log_not_found off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Static assets — long cache, immutable content (content-hashed where
# mutable, e.g. style-<hash>.css; legacy unhashed assets still benefit
# from a long max-age via periodic CSS-hash / JS-version URL churn).
location /static/ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    include /etc/nginx/snippets/security-headers.conf;
}

# Dynamic per-reach status, refreshed by every hourly pipeline run.
# Exact match wins over the /static/ prefix and overrides the immutable
# policy with a short TTL. Both expires and add_header must be explicit
# here because nginx's add_header does not inherit from an ancestor block
# once this block sets its own.
location = /static/reaches-state.json {
    expires 5m;
    add_header Cache-Control "public, max-age=300";
    include /etc/nginx/snippets/security-headers.conf;
}

# Sparkline SVGs, keyed by gauge_id and regenerated by every hourly
# pipeline run. Same override pattern as reaches-state.json above —
# the parent /static/ immutable policy is wrong here because gauge ids
# get reassigned when reaches are rewired (e.g. reach 104 moved from
# gauge 139 to 185 on 2026-04-23), leaving stale caches that point to
# ids the new index.html no longer references. 1h is plenty: sparklines
# are a trend, a single missing 15-min point is invisible.
location = /static/sparklines.json {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    include /etc/nginx/snippets/security-headers.conf;
}

# Service worker — cached by the browser but always revalidated so SW
# updates propagate immediately rather than lagging by expires 5m.
location = /sw.js {
    add_header Cache-Control "no-cache";
    include /etc/nginx/snippets/security-headers.conf;
}

# Generated HTML/CSV/text pages — short cache, regenerated hourly.
# limit_req zone=global protects against crawl bursts; burst=40 absorbs
# normal page-load bursts where a client fetches the table + sparklines +
# icons + static assets together.
location / {
    limit_req zone=global burst=40 nodelay;
    try_files $uri $uri/ =404;
    expires 5m;
    add_header Cache-Control "public";
    include /etc/nginx/snippets/security-headers.conf;
}

# PHP endpoints via php-fpm.
# NOTE: Cache-Control is left to each PHP file to set explicitly via
# header() — blanket add_header here would duplicate alongside the
# per-page value and produce conflicting directives (e.g. public from
# nginx + private from description.php). Every entry point in php/
# sets its own; see the audit comment in php/about.php style.
location ~ \.php$ {
    limit_req zone=php burst=20 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    # NOTE: SQLITE_PATH / EDITOR_FEATURE / TURNSTILE_SITE_KEY / MAIL_FROM /
    # SITE_URL are no longer forwarded via fastcgi_param. PHP reads them
    # from /etc/kayak/runtime-config.json (php/includes/config.php), with
    # getenv() fallback for TURNSTILE_SECRET via the FPM-pool env channel.
    # See docs/done/PLAN_tier3_closeout.md § Phase 2.5.

    include /etc/nginx/snippets/security-headers.conf;
}

# /status.json — public health snapshot for the status page +
# monitors. Internally rewrites to /status.php (PHP-FPM handles
# JSON emission). The .json extension is a cosmetic affordance for
# humans browsing; the file is a normal PHP endpoint. See
# docs/PLAN_production_discipline.md § Phase 2.1.
location = /status.json {
    rewrite ^ /status.php last;
}

# Edit endpoint — rate-limited, no cache
location = /edit.php {
    limit_req zone=edit burst=2 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    # edit.php uses the editor session cookie (ed_sess) for maintainer
    # auth after Phase 6 of the 2026-04-22 plan; no EDIT_PASSWORD is
    # required or consumed. EDITOR_FEATURE must be "1" on this host so
    # maintainers can reach /login.php to obtain the cookie.
    add_header Cache-Control "no-cache, no-store";
    include /etc/nginx/snippets/security-headers.conf;
}

# Auth endpoints — three independent zones so e.g. contact spam can't
# lock out logins: login (3/min, tight — each request emails a magic
# link), auth (10/min, relaxed — token consumption is brute-safe),
# contact (10/min, anonymous, gated by Turnstile + honeypot).
# /login.php uses the Turnstile-enabled CSP variant so the widget can load.
location = /login.php { limit_req zone=login burst=2 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers-turnstile.conf;
}
location = /auth.php { limit_req zone=auth burst=4 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}
location = /logout.php { limit_req zone=auth burst=4 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}
location = /account.php { limit_req zone=php burst=5 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}

# Phase 2 editor endpoints — no cache; auth enforced in PHP
location = /propose.php { limit_req zone=php burst=5 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}
location = /comment.php { limit_req zone=php burst=5 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}
# Anonymous contact form — Turnstile-gated, auth rate limit, Turnstile CSP
location = /contact.php { limit_req zone=contact burst=4 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers-turnstile.conf;
}
location = /review.php { limit_req zone=php burst=5 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}
location = /admin.php { limit_req zone=php burst=5 nodelay;
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    add_header Cache-Control "no-store";
    include /etc/nginx/snippets/security-headers.conf;
}

# Let's Encrypt ACME challenge.
# The ^~ modifier is required: without it nginx falls through to the
# `location ~ /\.` dotfile regex above (regex beats plain prefix), which
# returns 404 and breaks webroot HTTP-01. The current `--nginx` renewer
# injects its own exact-match location so it works without ^~, but the
# moment you switch to `--webroot` (or any future tool using the static
# location), this modifier is what keeps cert renewal working.
location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
}

# security.txt (RFC 9116) — beats the dotfile-block regex via exact match.
location = /.well-known/security.txt {
    alias /home/pat/public_html/static/security.txt;
    add_header Cache-Control "public, max-age=86400";
}

# Legacy path — some tools still probe /security.txt directly.
location = /security.txt {
    return 301 /.well-known/security.txt;
}

# Custom error page
error_page 404 /404.html;
location = /404.html {
    internal;
}
