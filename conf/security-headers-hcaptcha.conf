# Security headers — hCaptcha-enabled variant for /login.php (and other
# pages that embed the hCaptcha widget). Identical to security-headers.conf
# except the CSP allow-lists the hCaptcha origins.
#
# Per hCaptcha docs (https://docs.hcaptcha.com/#content-security-policy-settings),
# the widget needs script/frame/style/connect access to hcaptcha.com and its
# subdomains.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://hcaptcha.com https://*.hcaptcha.com; img-src 'self' data: https://*.tile.opentopomap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self' https://hcaptcha.com https://*.hcaptcha.com; frame-src https://hcaptcha.com https://*.hcaptcha.com; form-action 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; report-uri /csp-report.php" always;
