nwrfc.xml:
  urls:
    # CMRO3: McKenzie above South Fork (USGS 14159110 flow defunct since 2006)
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=CMRO3&pe=HG&dtype=b&numdays=1"
    # LOCO3 (Lookout Creek) — matches USGS 14161500 digit-for-digit (2026-04-17); outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=LOCO3&pe=HG&dtype=b&numdays=1"
    # LOPO3 (Lookout Point Dam) — retired 2026-04-17: no USGS equivalent, no reach needs it
    # WNFO3 (Wiley Creek) — matches USGS 14187000 digit-for-digit (2026-04-17); outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=WNFO3&pe=HG&dtype=b&numdays=1"
    # Idaho Salmon basin — NWRFC forecast points paired with USGS feed for outage redundancy.
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=SRYI1&pe=HG&dtype=b&numdays=1"
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=MIDI1&pe=HG&dtype=b&numdays=1"
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=KRSI1&pe=HG&dtype=b&numdays=1"
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=JOHI1&pe=HG&dtype=b&numdays=1"
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=RIGI1&pe=HG&dtype=b&numdays=1"
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=WHBI1&pe=HG&dtype=b&numdays=1"
    # Selway (Idaho) — SELI1 matches USGS 13336500 digit-for-digit; outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=SELI1&pe=HG&dtype=b&numdays=1"
    # Lochsa (Idaho) — LOCI1 matches USGS 13337000 digit-for-digit; outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=LOCI1&pe=HG&dtype=b&numdays=1"
    # SF Clearwater (Idaho) — STII1 matches USGS 13338500 Stites; outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=STII1&pe=HG&dtype=b&numdays=1"
    # Klickitat (Washington) — PITW1 matches USGS 14113000 near Pitt; outage redundancy
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=PITW1&pe=HG&dtype=b&numdays=1"
    # Klickitat (Washington) — KLCW1 matches USGS 14107000 abv West Fork nr Glenwood
    - url: "https://www.nwrfc.noaa.gov/xml/xml.cgi?id=KLCW1&pe=HG&dtype=b&numdays=1"

nwrfc.textplot:
  urls:
    - url: "https://www.nwrfc.noaa.gov/station/flowplot/textPlot.cgi?id=APLO3&pe=QI"
    # FALO3 inflow — feeds the Fall_Creek_Inflow gauge used by upstream reaches
    - url: "https://www.nwrfc.noaa.gov/station/flowplot/textPlot.cgi?id=FALO3&pe=QI"

