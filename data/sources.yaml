pacificorp:
  urls:
    # Rogue River Bypass — North Fork Diversion Dam → Prospect No. 2 powerhouse.
    # Single station today; gauge OR Hwy 62 bridge, ~0.3 mi below the dam.
    # Naive timestamps published in America/Los_Angeles (PDT/PST DST-aware).
    - url: "https://www.pacificorp.com/etc/pcorp/datafiles/hydro/RogueRiverBypass.xml"
      stations:
        PR2R.NFD_BYP_80FL_PI: America/Los_Angeles

usbr:
  urls:
    # Narrowed 2026-04-17 from 87 → 8 stations (only the linked ones).
    # All 8 appear in gauge_source; the prior 76 orphans produced data nobody read.
    # USBR pn-hydromet publishes each station's timestamps in its own local
    # timezone, so the stations: map below is required for correct UTC storage.
    # Oregon Pacific stations are on America/Los_Angeles (PDT/PST); Idaho
    # Mountain stations and Malheur-County OR's ROMO are on America/Boise.
    - url: "https://www.usbr.gov/pn-bin/v1/instant.pl?back=3&format=csv&list=BENO,CSCI,DEBO,HCDI,HRSI,ROMO,UMAO,WICO"
      stations:
        BENO: America/Los_Angeles
        DEBO: America/Los_Angeles
        WICO: America/Los_Angeles
        UMAO: America/Los_Angeles
        CSCI: America/Boise
        HRSI: America/Boise
        HCDI: America/Boise
        ROMO: America/Boise

