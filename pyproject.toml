[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kayak"
version = "0.1.0"
description = "River level data aggregation from government agencies"
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0",
    "Jinja2>=3.1",
    "SQLAlchemy>=2.0",
    "alembic>=1.13",
    "click>=8.1",
    "requests>=2.31",
    "lxml>=5.0",
    "beautifulsoup4>=4.12",
    "matplotlib>=3.8",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
mysql = ["PyMySQL>=1.1", "cryptography>=42.0"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "httpx>=0.27",         # Flask test client
]

[project.scripts]
levels = "kayak.cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/kayak"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.envs.default]
features = ["dev"]
