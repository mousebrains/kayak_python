<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif" font-size="11">
  <defs>
    <style>
      .table-header { fill: #2c3e50; }
      .table-header-text { fill: white; font-weight: bold; font-size: 12px; }
      .table-body { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 1; }
      .col-text { fill: #2c3e50; font-size: 10px; }
      .pk { fill: #e74c3c; font-size: 9px; font-weight: bold; }
      .fk { fill: #3498db; font-size: 9px; }
      .rel-line { stroke: #7f8c8d; stroke-width: 1.5; fill: none; }
      .rel-line-cache { stroke: #e67e22; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
      .section-label { fill: #7f8c8d; font-size: 14px; font-weight: bold; font-style: italic; }
      .section-bg { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 8; }
      .cache-bg { fill: #fef9e7; stroke: #f0e68c; stroke-width: 1; rx: 8; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7f8c8d"/>
    </marker>
    <marker id="crow" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M12,0 L0,4 L12,8 M12,2 L4,4 L12,6" stroke="#7f8c8d" fill="none" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Section backgrounds -->
  <rect class="section-bg" x="10" y="10" width="580" height="470"/>
  <text class="section-label" x="25" y="32">Data Acquisition</text>

  <rect class="section-bg" x="610" y="10" width="580" height="570"/>
  <text class="section-label" x="625" y="32">River Reaches</text>

  <rect class="cache-bg" x="10" y="500" width="580" height="390"/>
  <text class="section-label" x="25" y="522">Observation Data &amp; Cache</text>

  <!-- ==================== GAUGE ==================== -->
  <g transform="translate(30, 50)">
    <rect class="table-header" width="200" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="70" y="15">gauge</text>
    <rect class="table-body" x="0" y="22" width="200" height="130"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">name VARCHAR(256) UNIQUE</text>
    <text class="col-text" x="25" y="63">location TEXT</text>
    <text class="col-text" x="25" y="76">latitude NUMERIC(9,6)</text>
    <text class="col-text" x="25" y="89">longitude NUMERIC(9,6)</text>
    <text class="col-text" x="25" y="102">usgs_id VARCHAR(32)</text>
    <text class="col-text" x="25" y="115">elevation, drainage_area</text>
    <text class="col-text" x="25" y="128">bank_full, flood_stage</text>
    <text class="fk" x="5" y="141">FK</text><text class="col-text" x="25" y="141">rating_id -> rating</text>
  </g>

  <!-- ==================== SOURCE ==================== -->
  <g transform="translate(30, 260)">
    <rect class="table-header" width="200" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="70" y="15">source</text>
    <rect class="table-body" x="0" y="22" width="200" height="78"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">name VARCHAR(256)</text>
    <text class="col-text" x="25" y="63">agency VARCHAR(64)</text>
    <text class="fk" x="5" y="76">FK</text><text class="col-text" x="25" y="76">fetch_url_id -> fetch_url</text>
    <text class="fk" x="5" y="89">FK</text><text class="col-text" x="25" y="89">calc_expression_id -> calc_expr</text>
  </g>

  <!-- ==================== GAUGE_SOURCE ==================== -->
  <g transform="translate(140, 200)">
    <rect class="table-header" width="130" height="18" rx="3" ry="3"/>
    <text class="table-header-text" x="20" y="13" font-size="10">gauge_source</text>
    <rect class="table-body" x="0" y="18" width="130" height="30"/>
    <text class="pk" x="5" y="31">PK</text><text class="col-text" x="22" y="31">gauge_id</text>
    <text class="pk" x="5" y="43">PK</text><text class="col-text" x="22" y="43">source_id</text>
  </g>

  <!-- ==================== FETCH_URL ==================== -->
  <g transform="translate(310, 260)">
    <rect class="table-header" width="170" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="50" y="15">fetch_url</text>
    <rect class="table-body" x="0" y="22" width="170" height="78"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">url VARCHAR(512) UNIQUE</text>
    <text class="col-text" x="25" y="63">parser VARCHAR(32)</text>
    <text class="col-text" x="25" y="76">is_active BOOLEAN</text>
    <text class="col-text" x="25" y="89">last_fetched_at DATETIME</text>
  </g>

  <!-- ==================== CALC_EXPRESSION ==================== -->
  <g transform="translate(310, 370)">
    <rect class="table-header" width="170" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="30" y="15">calc_expression</text>
    <rect class="table-body" x="0" y="22" width="170" height="65"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">data_type VARCHAR(11)</text>
    <text class="col-text" x="25" y="63">expression VARCHAR(512)</text>
    <text class="col-text" x="25" y="76">time_expression TEXT</text>
  </g>

  <!-- ==================== RATING ==================== -->
  <g transform="translate(310, 80)">
    <rect class="table-header" width="140" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="45" y="15">rating</text>
    <rect class="table-body" x="0" y="22" width="140" height="45"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">url VARCHAR(512)</text>
    <text class="col-text" x="25" y="63">parser VARCHAR(32)</text>
  </g>

  <!-- ==================== RATING_DATA ==================== -->
  <g transform="translate(310, 160)">
    <rect class="table-header" width="140" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="30" y="15">rating_data</text>
    <rect class="table-body" x="0" y="22" width="140" height="35"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">rating_id, gauge_height_ft</text>
    <text class="col-text" x="25" y="50">flow_cfs FLOAT</text>
  </g>

  <!-- ==================== OBSERVATION ==================== -->
  <g transform="translate(30, 540)">
    <rect class="table-header" width="220" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="60" y="15">observation</text>
    <rect class="table-body" x="0" y="22" width="220" height="55"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">source_id, observed_at, data_type</text>
    <text class="col-text" x="25" y="50">value FLOAT</text>
    <text class="col-text" x="25" y="63" fill="#7f8c8d" font-size="9">~5.4M rows</text>
  </g>

  <!-- ==================== LATEST_OBSERVATION ==================== -->
  <g transform="translate(30, 640)">
    <rect class="table-header" width="220" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="40" y="15">latest_observation</text>
    <rect class="table-body" x="0" y="22" width="220" height="65"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">source_id, data_type</text>
    <text class="col-text" x="25" y="50">observed_at, value</text>
    <text class="col-text" x="25" y="63">prev_observed_at, prev_value</text>
    <text class="col-text" x="25" y="76">delta_per_hour</text>
  </g>

  <!-- ==================== LATEST_GAUGE_OBSERVATION ==================== -->
  <g transform="translate(310, 540)">
    <rect class="table-header" width="250" height="22" rx="4" ry="4" fill="#e67e22"/>
    <text class="table-header-text" x="30" y="15">latest_gauge_observation</text>
    <rect class="table-body" x="0" y="22" width="250" height="78" fill="#fef3e2"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">gauge_id, data_type</text>
    <text class="col-text" x="25" y="50">observed_at, value</text>
    <text class="col-text" x="25" y="63">prev_observed_at, prev_value</text>
    <text class="col-text" x="25" y="76">delta_per_hour</text>
    <text class="fk" x="5" y="89">FK</text><text class="col-text" x="25" y="89">source_id (contributing source)</text>
  </g>

  <!-- ==================== REACH ==================== -->
  <g transform="translate(630, 50)">
    <rect class="table-header" width="230" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="85" y="15">reach</text>
    <rect class="table-body" x="0" y="22" width="230" height="195"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="fk" x="5" y="50">FK</text><text class="col-text" x="25" y="50">gauge_id -> gauge</text>
    <text class="col-text" x="25" y="63">name, display_name, sort_name</text>
    <text class="col-text" x="25" y="76">river, description, difficulties</text>
    <text class="col-text" x="25" y="89">basin, region, nature</text>
    <text class="col-text" x="25" y="102">latitude, longitude (midpoint)</text>
    <text class="col-text" x="25" y="115">latitude_start, longitude_start</text>
    <text class="col-text" x="25" y="128">latitude_end, longitude_end</text>
    <text class="col-text" x="25" y="141">length, gradient, elevation_lost</text>
    <text class="col-text" x="25" y="154">geom TEXT (trace coords)</text>
    <text class="col-text" x="25" y="167">optimal_flow, season</text>
    <text class="col-text" x="25" y="180">scenery, remoteness</text>
    <text class="col-text" x="25" y="193">aw_id, no_show</text>
    <text class="col-text" x="25" y="206" fill="#7f8c8d" font-size="9">599 reaches</text>
  </g>

  <!-- ==================== STATE ==================== -->
  <g transform="translate(940, 50)">
    <rect class="table-header" width="140" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="48" y="15">state</text>
    <rect class="table-body" x="0" y="22" width="140" height="45"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">name VARCHAR(64) UNIQUE</text>
    <text class="col-text" x="25" y="63">abbreviation VARCHAR(2)</text>
  </g>

  <!-- ==================== REACH_STATE ==================== -->
  <g transform="translate(910, 120)">
    <rect class="table-header" width="120" height="18" rx="3" ry="3"/>
    <text class="table-header-text" x="20" y="13" font-size="10">reach_state</text>
    <rect class="table-body" x="0" y="18" width="120" height="30"/>
    <text class="pk" x="5" y="31">PK</text><text class="col-text" x="22" y="31">reach_id</text>
    <text class="pk" x="5" y="43">PK</text><text class="col-text" x="22" y="43">state_id</text>
  </g>

  <!-- ==================== REACH_CLASS ==================== -->
  <g transform="translate(630, 290)">
    <rect class="table-header" width="190" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="55" y="15">reach_class</text>
    <rect class="table-body" x="0" y="22" width="190" height="65"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="fk" x="5" y="50">FK</text><text class="col-text" x="25" y="50">reach_id -> reach</text>
    <text class="col-text" x="25" y="63">name VARCHAR(32) e.g. "III(IV)"</text>
    <text class="col-text" x="25" y="76">low, high, data_types</text>
  </g>

  <!-- ==================== REACH_LEVEL ==================== -->
  <g transform="translate(630, 390)">
    <rect class="table-header" width="190" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="55" y="15">reach_level</text>
    <rect class="table-body" x="0" y="22" width="190" height="65"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="fk" x="5" y="50">FK</text><text class="col-text" x="25" y="50">reach_id -> reach</text>
    <text class="col-text" x="25" y="63">level (low, okay, high)</text>
    <text class="col-text" x="25" y="76">low, high, data_types</text>
  </g>

  <!-- ==================== GUIDEBOOK ==================== -->
  <g transform="translate(940, 290)">
    <rect class="table-header" width="170" height="22" rx="4" ry="4"/>
    <text class="table-header-text" x="48" y="15">guidebook</text>
    <rect class="table-body" x="0" y="22" width="170" height="65"/>
    <text class="pk" x="5" y="37">PK</text><text class="col-text" x="25" y="37">id INTEGER</text>
    <text class="col-text" x="25" y="50">title, subtitle, edition</text>
    <text class="col-text" x="25" y="63">author TEXT</text>
    <text class="col-text" x="25" y="76">url TEXT</text>
  </g>

  <!-- ==================== REACH_GUIDEBOOK ==================== -->
  <g transform="translate(900, 190)">
    <rect class="table-header" width="150" height="18" rx="3" ry="3"/>
    <text class="table-header-text" x="15" y="13" font-size="10">reach_guidebook</text>
    <rect class="table-body" x="0" y="18" width="150" height="55"/>
    <text class="pk" x="5" y="31">PK</text><text class="col-text" x="22" y="31">reach_id</text>
    <text class="pk" x="5" y="43">PK</text><text class="col-text" x="22" y="43">guidebook_id</text>
    <text class="col-text" x="22" y="55">page, run TEXT</text>
    <text class="col-text" x="22" y="67">url TEXT</text>
  </g>

  <!-- ==================== RELATIONSHIPS ==================== -->

  <!-- gauge -> gauge_source -->
  <line class="rel-line" x1="130" y1="200" x2="140" y2="210" marker-end="url(#crow)"/>

  <!-- source -> gauge_source -->
  <line class="rel-line" x1="130" y1="260" x2="170" y2="248" marker-end="url(#crow)"/>

  <!-- gauge -> rating -->
  <line class="rel-line" x1="230" y1="130" x2="310" y2="110"/>

  <!-- rating -> rating_data -->
  <line class="rel-line" x1="380" y1="147" x2="380" y2="160" marker-end="url(#crow)"/>

  <!-- source -> fetch_url -->
  <line class="rel-line" x1="230" y1="300" x2="310" y2="290"/>

  <!-- source -> calc_expression -->
  <line class="rel-line" x1="230" y1="330" x2="310" y2="390"/>

  <!-- source -> observation -->
  <line class="rel-line" x1="100" y1="360" x2="100" y2="540" marker-end="url(#crow)"/>

  <!-- source -> latest_observation -->
  <line class="rel-line" x1="80" y1="360" x2="80" y2="640" marker-end="url(#crow)"/>

  <!-- gauge -> latest_gauge_observation -->
  <path class="rel-line-cache" d="M 200 200 C 280 200, 400 400, 430 540" marker-end="url(#crow)"/>

  <!-- gauge -> reach -->
  <path class="rel-line" d="M 230 120 L 600 120 L 630 100" marker-end="url(#crow)"/>

  <!-- reach -> reach_state -->
  <line class="rel-line" x1="860" y1="120" x2="910" y2="135" marker-end="url(#crow)"/>

  <!-- state -> reach_state -->
  <line class="rel-line" x1="970" y1="117" x2="970" y2="120" marker-end="url(#crow)"/>

  <!-- reach -> reach_class -->
  <line class="rel-line" x1="720" y1="267" x2="720" y2="290" marker-end="url(#crow)"/>

  <!-- reach -> reach_level -->
  <line class="rel-line" x1="700" y1="267" x2="700" y2="390" marker-end="url(#crow)"/>

  <!-- reach -> reach_guidebook -->
  <line class="rel-line" x1="860" y1="180" x2="900" y2="200" marker-end="url(#crow)"/>

  <!-- guidebook -> reach_guidebook -->
  <line class="rel-line" x1="1010" y1="290" x2="990" y2="273" marker-end="url(#crow)"/>

  <!-- Legend -->
  <g transform="translate(640, 500)">
    <rect width="180" height="70" fill="white" stroke="#dee2e6" rx="4"/>
    <text x="10" y="18" font-size="11" font-weight="bold" fill="#2c3e50">Legend</text>
    <line x1="10" y1="35" x2="40" y2="35" class="rel-line"/>
    <text x="45" y="39" class="col-text">Foreign key</text>
    <line x1="10" y1="55" x2="40" y2="55" class="rel-line-cache"/>
    <text x="45" y="59" class="col-text">Gauge-level cache</text>
    <text class="pk" x="10" y="18" transform="translate(100, 12)">PK</text>
    <text class="fk" x="10" y="18" transform="translate(130, 12)">FK</text>
  </g>
</svg>
